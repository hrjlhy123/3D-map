<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Ripple Video Keyed by Canvas</title>
        <style>
    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: Arial, Helvetica, sans-serif;
      background: #ff641f;
    }

    .page {
      position: relative;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background:
        radial-gradient(circle at 50% 45%, rgba(255,255,255,0.03), transparent 30%),
        linear-gradient(180deg, #ff6a20 0%, #ff5a17 100%);
      isolation: isolate;
    }

    .title {
      position: absolute;
      left: 50%;
      top: 7%;
      transform: translateX(-50%);
      font-size: clamp(54px, 14vw, 210px);
      font-weight: 700;
      letter-spacing: -0.06em;
      color: #efe2b4;
      white-space: nowrap;
      user-select: none;
      z-index: 1;
    }

    .subtitle {
      position: absolute;
      left: 50%;
      bottom: 8%;
      transform: translateX(-50%);
      font-size: clamp(16px, 2vw, 30px);
      color: rgba(255, 245, 220, 0.92);
      white-space: nowrap;
      user-select: none;
      z-index: 1;
    }

    .tip {
      position: absolute;
      right: 18px;
      top: 16px;
      font-size: 13px;
      color: rgba(255,255,255,0.65);
      z-index: 3;
      user-select: none;
    }

    .ripple-stage {
      position: absolute;
      left: 50%;
      top: 50%;
      width: min(42vw, 540px);
      aspect-ratio: 16 / 9;
      transform: translate(-50%, -50%);
      pointer-events: none;
      z-index: 2;
    }

    canvas.ripple-canvas {
      width: 100%;
      height: 100%;
      display: block;
      pointer-events: none;
      filter: brightness(1.08) contrast(1.2);
    }

    video#sourceSplash {
      display: none;
    }

    @media (max-width: 700px) {
      .ripple-stage {
        width: min(70vw, 420px);
      }

      .subtitle {
        width: 86vw;
        text-align: center;
        white-space: normal;
      }
    }
  </style>
    </head>
    <body>
        <div class="page">
            <div class="title">gentlerain</div>
            <div class="subtitle">Video drawn into canvas, black keyed to
                transparent</div>
            <div class="tip">canvas chroma-like black removal</div>

            <div class="ripple-stage">
                <canvas id="rippleCanvas" class="ripple-canvas" width="640"
                    height="360"></canvas>
            </div>

            <video
                id="sourceSplash"
                autoplay
                muted
                loop
                playsinline
                preload="auto"
                crossorigin="anonymous">
                <source src="./vid/7317370-preview.mp4" type="video/mp4" />
            </video>
        </div>

        <script>
    const video = document.getElementById("sourceSplash");
    const canvas = document.getElementById("rippleCanvas");
    const ctx = canvas.getContext("2d", { willReadFrequently: true });

    const offCanvas = document.createElement("canvas");
    const offCtx = offCanvas.getContext("2d", { willReadFrequently: true });

    // 黑色抠像阈值：越大，越多深色被透明化
    const BLACK_THRESHOLD = 38;

    // 软边范围：避免硬边
    const SOFTNESS = 28;

    function resizeBuffers() {
      const w = video.videoWidth || 640;
      const h = video.videoHeight || 360;
      canvas.width = w;
      canvas.height = h;
      offCanvas.width = w;
      offCanvas.height = h;
    }

    const GAIN = 1.35;        // 整体提亮
const CUT = 26;           // 低于这个亮度基本透明
const SOFT = 90;          // 柔化区间
const DESPILL = 0.75;     // 去黑边强度，0~1

function processFrame() {
  if (video.paused || video.ended || video.readyState < 2) {
    requestAnimationFrame(processFrame);
    return;
  }

  offCtx.drawImage(video, 0, 0, offCanvas.width, offCanvas.height);
  const frame = offCtx.getImageData(0, 0, offCanvas.width, offCanvas.height);
  const data = frame.data;
const FLOOR = 22;   // 小于这个亮度直接透明
const GAMMA = 1.25; // >1 会进一步压暗部，减少灰雾

for (let i = 0; i < data.length; i += 4) {
  const r = data[i];
  const g = data[i + 1];
  const b = data[i + 2];

  // 亮度 0~255
  const luma = 0.2126 * r + 0.7152 * g + 0.0722 * b;

  // 不是严格纯线性，而是“带黑场截断的线性”
  let a = (luma - FLOOR) / (255 - FLOOR);
  a = Math.max(0, Math.min(1, a));

  // 压低暗部残留
  a = Math.pow(a, GAMMA);

  const alpha255 = Math.round(a * 255);

  // 关键：不要保留原视频颜色，直接做成白色高光
  data[i] = 255;
  data[i + 1] = 255;
  data[i + 2] = 255;
  data[i + 3] = alpha255;
}

  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.putImageData(frame, 0, 0);

  requestAnimationFrame(processFrame);
}

    video.addEventListener("loadedmetadata", () => {
      resizeBuffers();
    });

    video.addEventListener("play", () => {
      resizeBuffers();
      processFrame();
    });

    // 某些浏览器本地 file:// 下 autoplay 可能有时序问题
    video.play().catch(err => {
      console.log("Autoplay blocked or delayed:", err);
    });
  </script>
    </body>
</html>
